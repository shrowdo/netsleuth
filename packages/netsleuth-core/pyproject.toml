[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "netsleuth-core"
version = "0.1.0"
description = "Shared core for NetSleuth network engineering tools"
requires-python = ">=3.11"
dependencies = [
    "netmiko>=4.3.0",
    "rich>=13.7.0",
    "PyYAML>=6.0",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["netsleuth_core*"]
